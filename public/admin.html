<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PalmScam Admin Dashboard</title>
    <!-- Include QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Admin-specific overrides */
        body { margin: 0; padding: 0; background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .admin-header { background: #1e293b; padding: 1.5rem 2rem; border-bottom: 2px solid #ef4444; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); flex-shrink: 0; }
        .admin-header h1 { margin: 0; font-size: 1.8rem; color: #ef4444; display: flex; align-items: center; gap: 0.75rem; }
        .live-indicator { display: flex; align-items: center; gap: 0.5rem; color: #10b981; font-weight: 600; font-size: 1.1rem; }
        .pulse { width: 12px; height: 12px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        
        .admin-layout { display: flex; padding: 1.5rem; gap: 1.5rem; flex: 1; min-height: 0; /* Important for scroll */ max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        
        .panel { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; display: flex; flex-direction: column; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .sidebar { width: 320px; flex-shrink: 0; }
        .main-content { flex: 1; min-width: 0; }
        
        h2 { font-size: 1.25rem; font-weight: 600; margin-top: 0; margin-bottom: 1rem; color: #94a3b8; display: flex; align-items: center; gap: 0.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid #334155; }
        
        .qr-section { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1rem; }
        .qr-container { background: white; padding: 1.5rem; border-radius: 8px; width: fit-content; display: flex; justify-content: center; align-items: center; width: 250px; height: 250px; }
        #qrcode { width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; } /* Ensure qrcode canvas fits */
        #qrcode img { max-width: 100%; max-height: 100%; }
        .server-url { font-family: 'Fira Code', monospace; background: #0f172a; padding: 0.75rem 1rem; border-radius: 6px; font-size: 0.95rem; color: #38bdf8; word-break: break-all; width: 100%; box-sizing: border-box; }
        
        .instructions { background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; padding: 1rem; font-size: 0.9rem; color: #cbd5e1; text-align: left; line-height: 1.5; margin-top: 1rem; }
        
        .data-table-container { flex: 1; overflow-y: auto; overflow-x: auto; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th { position: sticky; top: 0; background: #1e293b; color: #94a3b8; font-weight: 600; padding: 1rem; border-bottom: 1px solid #334155; z-index: 10; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 1rem; border-bottom: 1px solid #1e293b; color: #e2e8f0; font-family: 'Fira Code', monospace; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }
        .new-entry { animation: highlight-row 2s ease-out; }
        @keyframes highlight-row { 0% { background-color: rgba(239, 68, 68, 0.2); } 100% { background-color: transparent; } }
        
        .empty-state { padding: 3rem; text-align: center; color: #64748b; font-style: italic; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        
        /* Scrollbar styles */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>

    <header class="admin-header">
        <h1><i class="fa-solid fa-user-secret"></i> PalmScam Admin Dashboard</h1>
        <div class="live-indicator">
            <div class="pulse"></div>
            LIVE INTERCEPTION
        </div>
    </header>

    <div class="admin-layout">
        <!-- Main Content for Live Data -->
        <div class="main-content panel">
            <h2><i class="fa-solid fa-database"></i> Captured Victim Data (<span id="totalCount">0</span>)</h2>
            <div class="data-table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>IP Address</th>
                            <th>Browser/OS</th>
                            <th>Screen</th>
                            <th title="Language">Lang</th>
                            <th>Platform</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="fa-solid fa-radar fa-spin"></i>
                                    <p>Waiting for victims to scan their palms...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
